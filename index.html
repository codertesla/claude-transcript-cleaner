<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Transcript Cleaner</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>

<nav class="topbar">
  <div class="topbar-inner">
    <a class="brand" href=".">
      <svg class="brand-logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="2" width="15" height="20" rx="2.5" stroke="url(#lg)" stroke-width="1.6"/>
        <path d="M13.5 2v4.5a2 2 0 0 0 2 2H19" stroke="url(#lg)" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="8" y1="11" x2="15" y2="11" stroke="url(#lg)" stroke-width="1.3" stroke-linecap="round" opacity=".5"/>
        <line x1="8" y1="14.5" x2="13" y2="14.5" stroke="url(#lg)" stroke-width="1.3" stroke-linecap="round" opacity=".35"/>
        <path d="M22 9.5l-.9 1.8-1.8.9 1.8.9.9 1.8.9-1.8 1.8-.9-1.8-.9z" fill="#f0c487"/>
        <path d="M20.5 18l-.55 1.1-1.1.55 1.1.55.55 1.1.55-1.1 1.1-.55-1.1-.55z" fill="#c98b3c" opacity=".72"/>
        <defs><linearGradient id="lg" x1="4" y1="2" x2="22" y2="22"><stop stop-color="#f3eee2"/><stop offset="1" stop-color="#c98b3c"/></linearGradient></defs>
      </svg>
      <span class="brand-name">Claude Transcript Cleaner</span>
    </a>
    <div class="topbar-actions">
      <a class="topbar-link" href="https://github.com/codertesla/claude-transcript-cleaner" target="_blank" rel="noopener" title="GitHub">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">
        <span class="lang-label" id="langLabel">EN</span>
      </button>
    </div>
  </div>
</nav>

<main class="container">
  <section class="hero" id="heroSection">
    <div class="hero-grid">
      <div class="hero-copy">
        <div class="hero-eyebrow" data-i18n="heroEyebrow"></div>
        <h1 class="hero-title" data-i18n="heroTitle"></h1>
        <p class="hero-desc" data-i18n="heroDesc"></p>

        <div class="hero-points">
          <div class="hero-point">
            <div class="hero-point-title" data-i18n="heroPointTitle1"></div>
            <div class="hero-point-text" data-i18n="heroPointText1"></div>
          </div>
          <div class="hero-point">
            <div class="hero-point-title" data-i18n="heroPointTitle2"></div>
            <div class="hero-point-text" data-i18n="heroPointText2"></div>
          </div>
          <div class="hero-point">
            <div class="hero-point-title" data-i18n="heroPointTitle3"></div>
            <div class="hero-point-text" data-i18n="heroPointText3"></div>
          </div>
        </div>
      </div>

      <div class="hero-side">
        <div class="upload-wrap" id="uploadWrap">
          <div class="upload-card">
            <div class="upload-card-head">
              <div class="upload-card-kicker" data-i18n="uploadKicker"></div>
              <div class="upload-card-title" data-i18n="uploadCardTitle"></div>
              <div class="upload-card-desc" data-i18n="uploadCardDesc"></div>
            </div>

            <div class="upload-zone" id="uploadZone">
              <input type="file" id="fileInput" accept=".zip,.jsonl" multiple>
              <div class="upload-icon-large">
                <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div class="upload-main-text" data-i18n="uploadText"></div>
              <div class="upload-hint" data-i18n="uploadHint"></div>
            </div>

            <div class="trust-strip">
              <span class="trust-item">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span data-i18n="trustPrivacy"></span>
              </span>
              <span class="trust-dot"></span>
              <span class="trust-item">
                <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
                <span data-i18n="trustFast"></span>
              </span>
              <span class="trust-dot"></span>
              <span class="trust-item">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <span data-i18n="trustPreview"></span>
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="processing" id="processing">
    <div class="proc-spinner"></div>
    <div class="proc-text" data-i18n="processing"></div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <span id="errorText"></span>
  </div>

  <div class="results" id="results"></div>
</main>

<script src="app.js"></script>
</body>
</html>
