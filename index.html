<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Transcript Cleaner</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <h1>Claude Transcript Cleaner</h1>
      </div>
      <button class="lang-toggle" id="langToggle" onclick="toggleLang()">
        <span class="lang-label" id="langLabel">EN</span>
      </button>
    </div>
    <p class="subtitle" data-i18n="subtitle"></p>
  </div>

  <div class="upload-wrap" id="uploadWrap">
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".zip,.jsonl" multiple>
      <div class="upload-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="upload-main-text" data-i18n="uploadText"></div>
      <div class="upload-hint" data-i18n="uploadHint"></div>
    </div>
  </div>

  <div class="processing" id="processing">
    <div class="proc-spinner"></div>
    <div class="proc-text" data-i18n="processing"></div>
  </div>

  <div class="error-msg" id="errorMsg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    <span id="errorText"></span>
  </div>

  <div class="results" id="results"></div>
</div>
<script src="app.js"></script>
</body>
</html>
